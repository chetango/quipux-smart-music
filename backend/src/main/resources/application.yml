spring:
  application:
    name: quipux-api

  datasource:
    url: jdbc:h2:mem:quipuxdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  sql:
    init:
      mode: always

server:
  port: 8080

app:
  jwt:
    secret: "quipux-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm"
    expiration-ms: 86400000  # 24 horas

spotify:
  client-id: ${SPOTIFY_CLIENT_ID:changeme}
  client-secret: ${SPOTIFY_CLIENT_SECRET:changeme}

gemini:
  api-key: ${GEMINI_API_KEY:changeme}

logging:
  level:
    com.quipux: DEBUG
    org.springframework.security: WARN
